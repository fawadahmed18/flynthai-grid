events { worker_connections 1024; }

http {
    upstream orchestrator_cluster {
        server orchestrator:8080;
    }

    server {
        listen 80;

        # Forward all standard requests to the Go orchestrator
        location / {
            proxy_pass http://orchestrator_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Route status path directly to orchestrator status monitor
        location /status {
            proxy_pass http://orchestrator_cluster/orchestrator/status;
        }
    }
}
