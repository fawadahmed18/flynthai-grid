version: '3.8'

services:
  gateway:
    image: nginx:alpine
    container_name: flynth-gateway
    ports:
      - "80:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - orchestrator
    networks:
      - flynth-net

  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    container_name: flynth-orchestrator
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - MODEL_BACKEND_NODES=http://model-node-1:5000,http://model-node-2:5000
    depends_on:
      - model-node-1
      - model-node-2
      - redis
    networks:
      - flynth-net

  redis:
    image: redis:alpine
    container_name: flynth-cache
    ports:
      - "6379:6379"
    networks:
      - flynth-net

  model-node-1:
    image: python:3.10-slim
    container_name: flynth-model-node-1
    expose:
      - "5000"
    volumes:
      - ./simulator/mock_node.py:/app/mock_node.py:ro
    working_dir: /app
    command: python mock_node.py 5000
    networks:
      - flynth-net

  model-node-2:
    image: python:3.10-slim
    container_name: flynth-model-node-2
    expose:
      - "5000"
    volumes:
      - ./simulator/mock_node.py:/app/mock_node.py:ro
    working_dir: /app
    command: python mock_node.py 5000
    networks:
      - flynth-net

  dashboard:
    image: node:18-alpine
    container_name: flynth-dashboard
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "3500:3500"
    environment:
      - PORT=3500
    command: sh -c "npm install && node server.js"
    networks:
      - flynth-net

networks:
  flynth-net:
    driver: bridge

